# configs/exp_030_re1000_soap_sf_5k.toml
# What: EXP-030 — 從 EXP-028 step 3000 ckpt resume，延長至 5000 steps。
# Why: EXP-028 在 3000 步 KE 12.24%、Ens 13.35%、amp ratio 1.039，
#      結果優於 EXP-026（SOAP 無 SF），且 Ens 改善明顯。
#      延長至 5000 步觀察是否能進一步降低 KE/Ens，並維持 amp ratio 接近 1.0。
# Hypothesis: 5000 步後 KE < 12%、Ens < 12%，amp ratio 維持 0.98~1.05。
# Falsifiability: 若 KE > 0.13 或 Ens 上升，確認 SOAP+SF 在此規模 3k 已飽和。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5_dns_values.npz",
]
dns_paths = [
  "data/kolmogorov_dns_fp64_etdrk4_Re1000_N128_T5_ds4.npy",
]
re_values = [1000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 8
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 64
d_time = 8
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 1
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 64
output_head_gain = 1.0
operator_rank = 64

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 5000
num_physics_points = 32
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
resume_checkpoint = "artifacts/deeponet-cfc-re1000-soap-sf-3000/checkpoints/lnn_kolmogorov_step_3000.pt"
artifacts_dir = "artifacts/deeponet-cfc-re1000-soap-sf-5000"

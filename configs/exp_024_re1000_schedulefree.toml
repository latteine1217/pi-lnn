# configs/exp_024_re1000_schedulefree.toml
# What: EXP-024 — 以 Schedule-Free AdamW 取代 stepLR，其他與 EXP-022 完全相同。
# Why: EXP-022/023 用 stepLR(500×0.9)，需手動調 decay_steps/gamma，
#      且對總步數敏感。Schedule-Free 以 Polyak averaging 取代 schedule，
#      常數 LR + warmup 即可，可在任意步數停止並得到最佳平均推理權重。
# Hypothesis: Schedule-Free 在 3000 步達到與 EXP-022（stepLR 3000步）相當或更好的 KE rel-err；
#             且訓練曲線更平滑，無 stepLR 的階梯狀下降。
# Falsifiability: 若 KE rel-err > 0.18（EXP-022 為 0.1525），表示 Schedule-Free
#                 在此問題上不如 stepLR。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5_dns_values.npz",
]
dns_paths = [
  "data/kolmogorov_dns_fp64_etdrk4_Re1000_N128_T5_ds4.npy",
]
re_values = [1000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 8
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 64
d_time = 8
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 1
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 64
output_head_gain = 1.0
operator_rank = 64

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 3000
num_query_points = 128
num_physics_points = 32
learning_rate = 1e-3
weight_decay = 1e-4
lr_schedule = "schedulefree"
lr_warmup_steps = 300
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re1000-schedulefree-3000"

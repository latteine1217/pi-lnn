# configs/deeponet_cfc_re10000_wide_v2_cfc2res.toml
# What: EXP-032 — 在 EXP-031 基礎上加入 num_temporal_cfc_layers=2 + 層間殘差。
# Why: EXP-029（Re=1000, 2-layer 無殘差）顯示 amp ratio 退步；
#      現已在 TemporalCfCEncoder 實作層間殘差（layer_idx>0 時加前一層輸出），
#      預期能兼顧 KE 與 amp ratio 改善。
#      Re=10000 高湍流場需要更深的時間表達力。
# Hypothesis: KE rel-err < 35%（優於 EXP-031 的 39.4%），amp ratio > 0.5。
# Falsifiability: 若 KE > 0.40 或 amp ratio 退步，表示 2-layer CfC 對 Re=10000
#                 在此容量下無益，容量本身是主要瓶頸。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 128
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 2
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 128
output_head_gain = 1.0
operator_rank = 128

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 3000
num_query_points = 128
num_physics_points = 32
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re10000-wide-v2-cfc2res-3000"

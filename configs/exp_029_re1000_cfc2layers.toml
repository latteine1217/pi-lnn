# configs/exp_029_re1000_cfc2layers.toml
# What: EXP-029 — num_temporal_cfc_layers=2 對照組，其他與 EXP-024 完全相同。
# Why: 驗證增加 TemporalCfCEncoder 深度是否帶來改善。
#      單層 CfC 的 gating 機制已能學習時間演化；第二層是否能捕捉更高階的時間相依性？
# Hypothesis: KE rel-err 與 EXP-024（單層，約 12%）相當或更好。
#             若 2 層有改善，再考慮層間殘差實驗（EXP-030）。
# Falsifiability: 若 KE rel-err > 0.15 或訓練不穩定，表示在目前 d_model=64 下
#                 增加 CfC 深度無益，問題瓶頸不在時間表達力。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5_dns_values.npz",
]
dns_paths = [
  "data/kolmogorov_dns_fp64_etdrk4_Re1000_N128_T5_ds4.npy",
]
re_values = [1000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 8
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 64
d_time = 8
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 2
num_token_attention_layers = 1
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 64
output_head_gain = 1.0
operator_rank = 64

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 3000
num_query_points = 128
num_physics_points = 32
learning_rate = 1e-3
weight_decay = 1e-4
lr_schedule = "schedulefree"
lr_warmup_steps = 300
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re1000-cfc2layers-3000"

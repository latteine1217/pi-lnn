# configs/exp_cylinder_001_k100.toml
# EXP-CYLINDER-001: Cylinder wake sparse sensor reconstruction
#
# What:  Pi-LNN 首次在 cylinder wake 上的基線實驗。
#        K=100 QR-pivot sensor，Re=10031，非週期非均勻格，無 body forcing。
#
# NaN root cause（已修復，記錄於 lnn_kolmogorov.py + CLAUDE.md KNOWN_PITFALLS）：
#   physics second-order autograd 在 collocation point = sensor position 時，
#   torch.linalg.norm(r=0) 的二階導數 0/0 → NaN。
#   修法：改用 sqrt(r²+1e-8) smooth norm（不影響 Kolmogorov，因為 Kolmogorov 機率更低）。
#
# Hypothesis: smooth norm 修復後訓練穩定，KE < 30%（cylinder baseline）。
# Falsifiability: 若 physics residual 仍爆量，表示座標正規化或物理尺度有問題。

[train]
dataset_type = "cylinder"

sensor_jsons = [
  "data/cylinder_sensors/sensors_qrpivot_K100_cylinder_Re10031.json",
]
sensor_npzs = [
  "data/cylinder_sensors/sensors_qrpivot_K100_cylinder_Re10031_values.npz",
]
arrow_shards = [
  "/Users/latteine/Documents/coding/RealPDEBench/data/realpdebench/cylinder/hf_dataset/numerical/data-00000-of-00092.arrow",
]
re_values = [10031.0]
observed_sensor_channels = ["u", "v"]
sensor_subsample = 20   # T=3990 → T=200，與 Kolmogorov T=201 計算量相當

# 空間編碼：LearnableFourierEmb（與 EXP-062+ 相同，不假設週期）
fourier_harmonics = 16
fourier_embed_dim = 128
use_periodic_domain = false   # 關閉 relpos_bias 的週期折疊

# 時間
use_temporal_anchor = true
T_total = 20.0
temporal_anchor_harmonics = 2

# 模型容量（與 EXP-064 相同）
d_model = 256
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 256
output_head_gain = 1.0
operator_rank = 256

# Physics loss（cylinder wake：無強迫項）
domain_length = 1.0           # 座標已正規化至 [0,1]²
kolmogorov_k_f = 0.0          # 無強迫
kolmogorov_A = 0.0            # 無強迫

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0
poisson_loss_weight = 0.0

t_early_weight = 10.0
t_early_threshold = 0.05
physics_collocation_strategy = "random"

# GradNorm
use_gradnorm = true
gradnorm_update_freq = 1000
gradnorm_ema_momentum = 0.9
gradnorm_init_weights = [1.0, 0.01, 0.01, 0.01]

# Time marching
time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.3

# Optimizer
iterations = 10000
num_physics_points = 64
learning_rate = 1e-3
weight_decay = 0.0
lr_schedule = "soap"
use_schedule_free = true
soap_betas = [0.9, 0.999]
soap_precondition_frequency = 2
lr_warmup_steps = 2000
soap_use_step_decay = true
lr_decay_steps = 2000
lr_decay_gamma = 0.9
min_learning_rate = 1e-6
max_grad_norm = 1.0

# Sensor physics（暫關，先建 baseline）
use_sensor_physics = false
num_sensor_physics_time_samples = 1
sensor_physics_start_step = 1000

checkpoint_period = 500
seed = 42
device = "mps"

artifacts_dir = "artifacts/deeponet-cfc-cylinder-exp001-k100-warmup"

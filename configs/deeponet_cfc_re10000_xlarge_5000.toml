# configs/deeponet_cfc_re10000_xlarge_5000.toml
# What: EXP-034 — resume EXP-033（d_model=256, 1-layer CfC）至 5000 steps。
# Why: EXP-033 在 3000 steps 達到 KE=31.5%（最佳 Re=10000）；
#      EXP-030 的 Re=1000 經驗顯示 3k→5k 可帶來 ~20% KE 降幅（12.24%→9.61%）。
#      d_model=256 容量正確方向已驗證，值得延長優化。
# Hypothesis: KE rel-err < 26%（EXP-033 3k=31.5% 的 -20% 目標），amp ratio > 0.9。
# Falsifiability: 若 KE > 0.32（未優於 3k），表示 5k 對此容量的 SOAP+SF 無邊際收益，
#                 需考慮更換 loss 結構或加入 physics 監督。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 256
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 256
output_head_gain = 1.0
operator_rank = 256

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 5000
num_query_points = 128
num_physics_points = 32
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re10000-xlarge-5000"
resume_checkpoint = "artifacts/deeponet-cfc-re10000-xlarge-3000/checkpoints/lnn_kolmogorov_step_3000.pt"

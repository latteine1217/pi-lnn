# configs/exp_051_re10000_xlarge_harmonics20_t0boost.toml
# What: EXP-051 — 從頭訓練，兩項協同改動：
#   1. fourier_harmonics 16 → 20（對齊 K=100 sensor acc>0.8 的 k=20 上限）
#   2. t_early_weight = 3.0（t ≤ 0.1 的 data loss 乘 3×，強迫修正初始 KE 低估）
#
# Why:
#   EXP-048（最佳基準 KE=21.8%）的主要殘差來源是 t=0 KE 低估 58%。
#   harmonics=16 的位置編碼與 sensor k_cutoff=20 之間存在 k=17-20 缺口。
#   這兩項改動代碼量小、物理依據充分、且均未在先前實驗中測試。
#   注意：harmonics 改變導致架構維度不相容，必須從頭訓練。
#
# Single-variable discipline:
#   EXP-051 = harmonics=20 + t0_boost（兩者協同，代碼改動不重疊）
#   EXP-052 = 若 051 正向，再加 learnable CfC initial state
#
# Hypothesis: KE rel-err < 21.8%（EXP-048 基準）
# Falsifiability: 若 KE > 22% 或 t=0 KE err > 50%（vs 現在 58%），改動無效。
#
# 對照基準：EXP-048（KE=21.8%，10000 steps，harmonics=16，無 t0_boost）

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 20
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 256
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 256
output_head_gain = 1.0
operator_rank = 256

data_loss_weight = 1.0
t_early_weight = 3.0
t_early_threshold = 0.1
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0
poisson_loss_weight = 0.0

physics_collocation_strategy = "random"
physics_residual_normalize = false

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 10000
num_physics_points = 32
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 500
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re10000-exp051"

# configs/exp_058_re10000_xlarge_cfc_freerun.toml
# What: EXP-058 — 方案 B（CfC 自由積分）冷啟動 10000 步，IC Loss Weight（λ_IC=10），無 RAR。
#
# Why: DeepONet+CfC 目前 decoder 的時間處理只做線性映射（time_proj(dt)），
#      無法捕捉跨 sensor 時間間距的非線性動態。
#      方案 B 在 branch side 加入 CfC freerun cell：
#        h(t_q) = CfC_freerun(h(t_sensor), h(t_sensor), dt)
#      讓 branch token 在觀測之間自主演化，理論依據為 Latent ODE / ODE-RNN。
#
# Hypothesis: 方案 B 改善 branch token 的時間連貫性，KE rel-err 低於 EXP-057（冷啟動對照組）。
# Falsifiability: 若 KE ≥ EXP-057 最終值，則 CfC 自由積分在此設定無助於時間連貫性。
#
# 對照基準：
#   EXP-057（冷啟動 10k，IC weight，freerun=False，KE 待定）
#   EXP-055（resume EXP-048，IC weight，KE=17.1%）
#
# 差異點：use_cfc_freerun = true（EXP-057 無此 flag）

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 256
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 256
output_head_gain = 1.0
operator_rank = 256

use_cfc_freerun = true

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0
poisson_loss_weight = 0.0

t_early_weight = 10.0
t_early_threshold = 0.05

physics_collocation_strategy = "random"

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.3
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 10000
num_physics_points = 32
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 500
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re10000-exp058-cfc-freerun"

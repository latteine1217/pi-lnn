# configs/deeponet_cfc_re10000_xlarge_chebyshev.toml
# What: EXP-035 — 與 EXP-033 相同的容量（d_model=256，1-layer），
#       但 physics collocation 從 random-32 換成 Chebyshev-256（16×16 格點），
#       並啟用 physics_residual_normalize，從 step 0 重新訓練。
#
# Why: EXP-033（3k steps）KE=31.5%，純加容量的邊際收益遞減。
#      診斷：32 隨機 physics 點的 Nyquist 上限 k~5，無法約束 Re=10000 的中高頻結構；
#      momentum 殘差 O(10) vs continuity O(0.01)，不歸一化時 continuity 梯度形同虛設。
#      這是機制問題，不是容量問題。
#
# 機制變更：
#   physics_collocation_strategy = "chebyshev"：
#     16×16 Gauss-Chebyshev 格點，系統性覆蓋 [0,1]²，Nyquist k~16（vs 原本 k~5）。
#   physics_residual_normalize = true：
#     各殘差項除以自身批次 RMS，使 momentum / continuity 梯度量級對齊。
#   num_physics_points = 256：配合 16×16 grid（n_dim = round(sqrt(256)) = 16）。
#
# Hypothesis: Chebyshev 格點讓 physics loss 能約束 k=5~16 的中頻結構；
#             normalization 恢復 continuity 的有效梯度；
#             KE rel-err < 28%（優於 EXP-033 3k 的 31.5%），amp ratio > 0.9。
# Falsifiability: 若 KE > 0.32（不優於 EXP-033 3k），
#                 表示 k=5~16 的 physics 約束不是目前的主要瓶頸。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 256
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 256
output_head_gain = 1.0
operator_rank = 256

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0

# 機制變更（C）
physics_collocation_strategy = "chebyshev"
physics_residual_normalize = true
num_physics_points = 256

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 3000
num_query_points = 128
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re10000-xlarge-chebyshev-3000"

# configs/exp_037_re10000_chebyshev_only.toml
# What: EXP-037 — 與 EXP-031 相同設定（d=128），
#       僅將 physics collocation 從 random-32 換成 chebyshev-256，不加 normalize。
#
# Why: EXP-035（chebyshev + normalize）KE=66.1%，EXP-036（random + normalize）KE=86.7%。
#      physics_residual_normalize 已確認有害（自毀正反饋）。
#      本實驗單獨測試 chebyshev collocation 的效果，排除 normalize 干擾。
#
# Hypothesis: chebyshev 格點提升 k=5~16 的 physics 約束，KE < 37%（優於 EXP-031 的 39.4%）。
# Falsifiability: 若 KE > 0.39，表示 collocation 結構化本身對此問題也無效，
#                 physics loss 的空間覆蓋不是主要瓶頸。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 128
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 128
output_head_gain = 1.0
operator_rank = 128

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0

physics_collocation_strategy = "chebyshev"
physics_residual_normalize = false
num_physics_points = 256

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 3000
num_query_points = 128
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re10000-chebyshev-only-3000"

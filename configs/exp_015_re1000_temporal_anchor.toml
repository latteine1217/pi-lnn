# configs/exp_015_re1000_temporal_anchor.toml
# What: EXP-014 主線 + temporal phase anchor（絕對時間注入 trunk）。
# Why: EXP-014 的 trunk 只有相對時間 dt_to_query，在 chaotic Re=1000 流場中，
#      相同 dt 但不同絕對時間 t 的動態完全不同。
#      注入 sin/cos(2π n t / T_total) 提供絕對時間定位，目標降低 t=3.5∼4.5 的 phase 高峰。
# Hypothesis: t=3.5∼4.5 的 phase 偏差高峰來自模型缺乏絕對時間感，
#             而非 branch 容量不足或訓練步數問題。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5_dns_values.npz",
]
dns_paths = [
  "data/kolmogorov_dns_fp64_etdrk4_Re1000_N128_T5_ds4.npy",
]
re_values = [1000.0]
observed_sensor_channels = ["u", "v"]

rff_features = 32
rff_sigma = 4.0
rff_sigma_bands = [[16, 4.0], [8, 8.0], [8, 16.0]]
use_phase_anchor = true
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 64
d_time = 8
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 1
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 64
output_head_gain = 1.0
operator_rank = 64

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 3000
num_query_points = 128
num_physics_points = 32
learning_rate = 1e-3
weight_decay = 1e-4
lr_schedule = "step"
lr_decay_steps = 500
lr_decay_gamma = 0.9
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-midlong-uvomega-small-temporal-anchor-3000"

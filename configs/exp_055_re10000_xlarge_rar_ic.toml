# configs/exp_055_re10000_xlarge_rar_ic.toml
# What: EXP-055 — resume EXP-048 step_9500，加入 IC Loss Weight（t≤0.05 × 10），再跑 10000 步至 step 19500。
#
# Why: EXP-048（KE=21.8%）的 t=0 KE 低估 58%。
#      診斷：data loss 對 t=0 與其他時間步一視同仁；在 T_total=5 下，t≤0.05 佔
#      均勻採樣機率僅 1%，初始條件的 supervision gradient 極弱。
#      加入 t_early_weight=10 強迫模型對 t≤0.05 的重建誤差加重懲罰。
#      Resume EXP-048（非 EXP-054），保持單一變數：只有 IC weight，無 RAR。
#
# Hypothesis: t=0 KE rel-err < 58%（EXP-048）；整體 KE rel-err < 21.8%（EXP-048 基準）
# Falsifiability: 若 step_19500 KE > 21.8%，IC weighting 單獨無益
#
# 對照基準：EXP-048（KE=21.8%，無 IC weight）；EXP-054（KE=20.2%，RAR 無 IC weight）

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 256
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 256
output_head_gain = 1.0
operator_rank = 256

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0
poisson_loss_weight = 0.0

t_early_weight = 10.0
t_early_threshold = 0.05

physics_collocation_strategy = "random"

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 19500
num_physics_points = 32
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 500
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re10000-exp055-ic"
resume_checkpoint = "artifacts/deeponet-cfc-re10000-exp055-ic/checkpoints/lnn_kolmogorov_step_14000.pt"

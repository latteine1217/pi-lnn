# configs/exp_041_re1000_wide.toml
# What: EXP-041 — Re=1000，與 EXP-031（Re=10000）完全相同的架構設定。
#
# Why: Transfer learning（A 方案）的前置實驗。
#      EXP-030（d=64, harmonics=8, 1-layer attn）與 EXP-031（d=128, harmonics=16, 2-layer attn）
#      架構不同，無法直接 transfer。必須先用 EXP-031 的架構訓練 Re=1000，
#      取得同架構的 weights，再 fine-tune 至 Re=10000（EXP-042）。
#
# Hypothesis: 相同架構下 Re=1000 仍可達到 KE < 12%（參考 EXP-030 的 9.61%，
#             但容量更大，3k 步預期 12% 左右）。
# Falsifiability: 若 KE > 20%，表示較大架構在 Re=1000 反而不穩定，
#                 需要更多步數或調整學習率。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5_dns_values.npz",
]
dns_paths = [
  "data/kolmogorov_dns_fp64_etdrk4_Re1000_N128_T5_ds4.npy",
]
re_values = [1000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 128
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 128
output_head_gain = 1.0
operator_rank = 128

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0
poisson_loss_weight = 0.0

physics_collocation_strategy = "random"
physics_residual_normalize = false
num_physics_points = 32

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 3000
num_query_points = 128
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re1000-wide-3000"

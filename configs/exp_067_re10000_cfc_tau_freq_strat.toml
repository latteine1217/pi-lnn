# configs/exp_067_re10000_cfc_tau_freq_strat.toml
# What: EXP-067 — EXP-064 baseline + #3 (CfC tau range) + #6 (frequency-stratified Fourier emb)
#
# Why:
#   #3 — CfC log_tau_a 原本 linspace(-1, 1) 使所有 channel τ/dt ∈ [7, 110]，全部偏向 slow path。
#        改用 (-3, 1) 覆蓋三個量級，對齊 turbulence eddy turnover scaling τ ∝ k^(-2/3)，
#        讓 hidden_size=256 個 channel 能同時表達 fast(高頻) + slow(低頻) 動態。
#   #6 — LearnableFourierEmb 原本以單一 σ=2.0 初始化所有 64 個投影通道；
#        對 Kolmogorov 能量譜（低頻 94% / 中頻 5% / 高頻 1%）的極不均勻分佈，
#        分層初始化讓 50% 通道做低頻精度（σ=1.0）、37.5% 中頻（σ=4.0）、
#        12.5% 高頻探索（σ=12.0），不犧牲低頻精度也能延伸覆蓋範圍。
#
# Hypothesis: KE 改善 -1~2pp（vs EXP-064 7.80%）；t=0 worst_rmse 下降；
#             band_mid 略改善（高頻 σ=12 帶來 spectral coverage）但仍受 K=100 上限。
# Falsifiability: 若 KE 退步且 band_mid 無變化 → 兩項初始化改動對此架構無 ROI，
#                 應回到 EXP-064 baseline。
#
# 注意：訓練曲線可能與 EXP-064 早期不同（CfC 動態與 Fourier 譜分佈都改）；
#       早期數百步 loss 可能較高，需看 5k+ 步是否收斂至更佳點。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
fourier_embed_dim = 128
# #6 — 頻率分層初始化（對齊 Kolmogorov 能量分佈）
fourier_sigma_bands = [1.0, 4.0, 12.0]
fourier_band_dim_ratios = [0.5, 0.375, 0.125]

use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 256
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 256
output_head_gain = 1.0
operator_rank = 256

# #3 — CfC 時間常數覆蓋 turbulence 多尺度（dt=0.025 ~ T_total=5）
cfc_log_tau_min = -3.0
cfc_log_tau_max = 1.0

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0
poisson_loss_weight = 0.0

t_early_weight = 10.0
t_early_threshold = 0.05

physics_collocation_strategy = "random"

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.3
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 10000
num_physics_points = 64
learning_rate = 1e-3
weight_decay = 0.0
lr_schedule = "soap"
use_schedule_free = true
soap_betas = [0.9, 0.999]
soap_precondition_frequency = 2
lr_warmup_steps = 2000
soap_use_step_decay = true
lr_decay_steps = 2000
lr_decay_gamma = 0.9
min_learning_rate = 1e-6
max_grad_norm = 1.0

use_gradnorm = true
gradnorm_update_freq = 1000
gradnorm_ema_momentum = 0.9
gradnorm_init_weights = [1.0, 0.01, 0.01, 0.01]

checkpoint_period = 500
seed = 42
device = "mps"
use_sensor_physics = true
num_sensor_physics_time_samples = 1
sensor_physics_start_step = 1000

artifacts_dir = "artifacts/deeponet-cfc-re10000-exp067-cfc-tau-freq-strat"

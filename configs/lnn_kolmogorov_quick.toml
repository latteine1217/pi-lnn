# configs/lnn_kolmogorov_quick.toml — 快速驗收（~1小時）
[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re1000/sensors_temporal_K50_N256_t0-20.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re1000/sensors_temporal_K50_N256_t0-20_dns_values.npz",
]
dns_paths = [
  "data/kolmogorov_dns/kolmogorov_dns_1000.npy",
]
re_values = [1000.0]

# 模型（DeepONet trunk + CfC temporal branch）
rff_features = 64
rff_sigma = 32.0
d_model = 128
d_time = 16
num_latent_tokens = 8
num_spatial_cfc_layers = 2
num_temporal_cfc_layers = 2
use_local_struct_features = false
sensor_knn_k = 4
num_token_attention_layers = 1
token_attention_heads = 4
num_query_mlp_layers = 2
query_mlp_hidden_dim = 256
output_head_gain = 5.0
operator_rank = 128

# 損失權重
data_loss_weight = 1.0
physics_loss_weight = 0.05
physics_loss_warmup_steps = 500
physics_loss_ramp_steps = 500
continuity_weight = 1.0

# Time-marching：從 t=[0,2] 逐步擴展到 t=[0,20]，前 50% 步數完成擴展
time_marching = true
time_marching_start = 2.0
time_marching_warmup = 0.5
kolmogorov_k_f = 4.0
kolmogorov_A = 0.1

# 訓練（快速版：1000步，減少 physics points 加速）
iterations = 1000
num_query_points = 512
num_physics_points = 128
learning_rate = 1e-3
weight_decay = 1e-4
lr_schedule = "cosine"
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 200
seed = 42
device = "auto"
artifacts_dir = "artifacts/lnn-kolmogorov-quick"

# configs/exp_069_re10000_combined.toml
# What: EXP-069 — EXP-064 baseline + 三項組合 (#3 CfC tau + #6 freq strat + #5 causal weighting)
#
# Why: 三項都是 turbulence-aware 的弱物理先驗，預期可加成不衝突：
#   - #3 給時間多尺度（CfC channel 級別）
#   - #6 給空間多尺度（Fourier 投影級別）
#   - #5 給訓練動態（loss 加權級別）
#
# 設計原則：唯一一個改變 loss 邏輯的是 #5，#3/#6 都是初始化改動，互不干擾。
#
# Hypothesis: 三項協同產出 KE < 7.0%（Re=10000 新紀錄）；
#             t=0 worst_rmse 顯著改善；band_mid 部分突破。
# Falsifiability: 若 KE ≥ EXP-064 (7.80%) 或不穩定 → 拆解三項判斷哪一項是噪音來源。
#
# 注意：本 config 是激進測試，建議先確認 EXP-067 與 EXP-068 各自有效後再跑此組合。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
fourier_embed_dim = 128
# #6 — 頻率分層
fourier_sigma_bands = [1.0, 4.0, 12.0]
fourier_band_dim_ratios = [0.5, 0.375, 0.125]

use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 256
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 256
output_head_gain = 1.0
operator_rank = 256

# #3 — CfC 多尺度時間常數
cfc_log_tau_min = -3.0
cfc_log_tau_max = 1.0

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0
poisson_loss_weight = 0.0

# #5 — Causal weighting（取代 t_early_weight）
t_early_weight = 1.0
t_early_threshold = 0.05
use_causal_weighting = true
causal_eps = 1.0
causal_num_bins = 16

physics_collocation_strategy = "random"

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.3
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 10000
num_physics_points = 64
learning_rate = 1e-3
weight_decay = 0.0
lr_schedule = "soap"
use_schedule_free = true
soap_betas = [0.9, 0.999]
soap_precondition_frequency = 2
lr_warmup_steps = 2000
soap_use_step_decay = true
lr_decay_steps = 2000
lr_decay_gamma = 0.9
min_learning_rate = 1e-6
max_grad_norm = 1.0

use_gradnorm = true
gradnorm_update_freq = 1000
gradnorm_ema_momentum = 0.9
gradnorm_init_weights = [1.0, 0.01, 0.01, 0.01]

checkpoint_period = 500
seed = 42
device = "mps"
use_sensor_physics = true
num_sensor_physics_time_samples = 1
sensor_physics_start_step = 1000

artifacts_dir = "artifacts/deeponet-cfc-re10000-exp069-combined"

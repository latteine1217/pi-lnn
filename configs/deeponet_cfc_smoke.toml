# configs/deeponet_cfc_smoke.toml
# What: DeepONet + CfC 的最小 smoke config。
# Why: 轉型初期先驗證 branch/trunk/operator-rank 與訓練入口都能正常起跑。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re1000/sensors_temporal_K50_N256_t0-20.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re1000/sensors_temporal_K50_N256_t0-20_dns_values.npz",
]
dns_paths = [
  "data/kolmogorov_dns/kolmogorov_dns_1000.npy",
]
re_values = [1000.0]

rff_features = 64
rff_sigma = 32.0
d_model = 128
d_time = 16
num_latent_tokens = 8
num_spatial_cfc_layers = 2
num_temporal_cfc_layers = 2
use_local_struct_features = false
sensor_knn_k = 4
num_token_attention_layers = 1
token_attention_heads = 4
num_query_mlp_layers = 2
query_mlp_hidden_dim = 256
output_head_gain = 5.0
operator_rank = 128

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 50
physics_loss_ramp_steps = 100
continuity_weight = 1.0

time_marching = true
time_marching_start = 2.0
time_marching_warmup = 0.5
kolmogorov_k_f = 4.0
kolmogorov_A = 0.1

iterations = 150
num_query_points = 256
num_physics_points = 64
learning_rate = 1e-3
weight_decay = 1e-4
lr_schedule = "cosine"
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 50
seed = 42
device = "auto"
artifacts_dir = "artifacts/deeponet-cfc-smoke"

# configs/exp_050_re10000_xlarge_20k.toml  (v2)
# What: EXP-050 — resume EXP-048（KE=21.8%），加入 physics collocation curriculum。
#
# Why: EXP-048 物理點固定 32，對高頻結構約束不足；
#      curriculum 設計：前 1000 步 warmup（time-marching 結束前固定 8 點），
#      step 1001–6000 線性從 8 → 128 點，step 6000 後固定 128 點。
#      time_marching_warmup = 0.1 × 10000 = 1000 步，與 physics warmup 對齊。
#
# Hypothesis: KE rel-err < 21.8%（EXP-048 基準）。
# Falsifiability: 若 KE 退步（> 22%），表示 physics curriculum 在 resume 情境有害。
#
# 對照基準：EXP-048（KE=21.8%，10000 steps）

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re10000/sensors_qrpivot_K100_N256_t0-5_si100_dns_values.npz",
]
dns_paths = [
  "data/dns/kolmogorov_dns_fp64_etdrk4_Re10000_N256_T5_dt2p5e4_si100_ds4.npy",
]
re_values = [10000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 16
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 256
d_time = 16
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 2
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 256
output_head_gain = 1.0
operator_rank = 256

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0
poisson_loss_weight = 0.0

physics_collocation_strategy = "random"
physics_residual_normalize = false

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.1
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 10000
num_physics_points = 128
num_physics_points_start = 8
num_physics_points_warmup_steps = 1000
num_physics_points_ramp_steps = 5000
learning_rate = 3e-3
weight_decay = 1e-4
lr_schedule = "soap"
use_schedule_free = true
soap_precondition_frequency = 10
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 500
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re10000-xlarge-20000"
resume_checkpoint = "artifacts/deeponet-cfc-re10000-xlarge-20000/deeponet-cfc-re10000-xlarge-10000/lnn_kolmogorov_final.pt"

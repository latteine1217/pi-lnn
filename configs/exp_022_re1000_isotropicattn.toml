# configs/exp_022_re1000_isotropicattn.toml
# What: EXP-022 — 將 relpos_bias 從方向性 (rel_x, rel_y, |rel|) 改為等向性 (|rel| only)。
# Why: EXP-021 確認週期 Fourier 消除 RFF 角度偏差後，
#      仍殘存 x 方向條紋偽影，根源為：
#      感測器 x 分佈非均勻 (66/128 x-columns covered)，
#      relpos_bias 的方向輸入將 x-column 非均勻性注入 attention，
#      造成不同 x 位置的 query 點得到系統性不同的 attention 分佈。
# Hypothesis: 改用純距離後，attention 變為等向，不再有 x-column 差異；
#             條紋應消失，KE rel-err 持平或改善（因方向偏差是干擾而非有用信號）。
# Falsifiability: 若 KE rel-err > 0.20（EXP-021 為 0.153），則距離不足以代替方向。

[train]
sensor_jsons = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5.json",
]
sensor_npzs = [
  "data/kolmogorov_sensors/re1000/sensors_qrpivot_K100_N128_t0-5_dns_values.npz",
]
dns_paths = [
  "data/kolmogorov_dns_fp64_etdrk4_Re1000_N128_T5_ds4.npy",
]
re_values = [1000.0]
observed_sensor_channels = ["u", "v"]

fourier_harmonics = 8
use_temporal_anchor = true
T_total = 5.0
temporal_anchor_harmonics = 2
d_model = 64
d_time = 8
num_spatial_cfc_layers = 1
num_temporal_cfc_layers = 1
num_token_attention_layers = 1
token_attention_heads = 4
num_query_mlp_layers = 1
query_mlp_hidden_dim = 64
output_head_gain = 1.0
operator_rank = 64

data_loss_weight = 1.0
physics_loss_weight = 0.01
physics_loss_warmup_steps = 0
physics_loss_ramp_steps = 0
continuity_weight = 1.0

time_marching = true
time_marching_start = 0.5
time_marching_warmup = 0.5
domain_length = 1.0
kolmogorov_k_f = 2.0
kolmogorov_A = 0.1

iterations = 3000
num_query_points = 128
num_physics_points = 32
learning_rate = 1e-3
weight_decay = 1e-4
lr_schedule = "step"
lr_decay_steps = 500
lr_decay_gamma = 0.9
min_learning_rate = 1e-6
max_grad_norm = 1.0
checkpoint_period = 100
seed = 42
device = "mps"
artifacts_dir = "artifacts/deeponet-cfc-re1000-isotropicattn-3000"
